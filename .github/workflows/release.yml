name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.1.0 or v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  macos-release:
    name: macOS Apple Silicon Release
    runs-on: macos-14
    env:
      RELEASE_VERSION_INPUT: ${{ github.event.inputs.version }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_B64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: release_meta
        name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Release workflow must run from main." >&2
            exit 1
          fi

          version="${RELEASE_VERSION_INPUT#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${RELEASE_VERSION_INPUT}" >&2
            exit 1
          fi

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease=false
          else
            prerelease=true
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Persist release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail

          node scripts/update-version.mjs "$RELEASE_VERSION"

          if git diff --quiet -- package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git commit \
            -m "chore(release): cut v$RELEASE_VERSION" \
            -m "Co-authored-by: Codex <noreply@openai.com>"
          git push origin HEAD:main

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify quality gates
        run: bun run verify

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build desktop debug bundle
        run: bun run tauri:build:debug

      - id: apple_api_key
        name: Write App Store Connect API key
        shell: bash
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID_VALUE: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_VALUE: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID_VALUE}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$key_path"
          {
            echo "path=$key_path"
            echo "key_id=$APPLE_API_KEY_ID_VALUE"
            echo "issuer=$APPLE_API_ISSUER_VALUE"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists on current main
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags origin
          head_sha="$(git rev-parse HEAD)"

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "$tag_sha" != "$head_sha" ]]; then
              echo "Tag ${RELEASE_TAG} already exists on ${tag_sha}, expected ${head_sha}." >&2
              exit 1
            fi
            exit 0
          fi

          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Build and publish signed release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_B64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ steps.apple_api_key.outputs.key_id }}
          APPLE_API_ISSUER: ${{ steps.apple_api_key.outputs.issuer }}
          APPLE_API_KEY_PATH: ${{ steps.apple_api_key.outputs.path }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: ThreadEx v${{ steps.release_meta.outputs.version }}
          releaseBody: |
            Apple Silicon macOS release for ThreadEx.
          releaseDraft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generateReleaseNotes: true
          uploadUpdaterJson: true
          uploadWorkflowArtifacts: true
          args: --target aarch64-apple-darwin
