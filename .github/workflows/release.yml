name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.1.0 or v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  macos-release:
    name: macOS Apple Silicon Release
    runs-on: macos-14
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION_INPUT: ${{ github.event.inputs.version }}
      NOTARY_PROFILE_NAME: SkeinNotary
      APPLE_CERTIFICATE_B64: ${{ secrets.APPLE_CERTIFICATE_P12_B64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      LEGACY_UPDATER_PRIVATE_KEY: ${{ secrets.LEGACY_UPDATER_PRIVATE_KEY }}
      LEGACY_UPDATER_PRIVATE_KEY_PASSWORD: ${{ secrets.LEGACY_UPDATER_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: release_meta
        name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Release workflow must run from main." >&2
            exit 1
          fi

          version="${RELEASE_VERSION_INPUT#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${RELEASE_VERSION_INPUT}" >&2
            exit 1
          fi

          prerelease=false
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease=true
          fi

          release_tag="v$version"
          git fetch --tags origin

          tag_exists=false
          tag_sha=""
          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            tag_exists=true
            tag_sha="$(git rev-list -n 1 "${release_tag}")"
          fi

          {
            echo "version=$version"
            echo "tag=$release_tag"
            echo "prerelease=$prerelease"
            echo "tag_exists=$tag_exists"
            echo "tag_sha=$tag_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop-backend -> target

      - name: Persist release version
        if: steps.release_meta.outputs.tag_exists != 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail

          node scripts/update-version.mjs "$RELEASE_VERSION"

          if git diff --quiet -- package.json desktop-backend/Cargo.toml; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json desktop-backend/Cargo.toml
          git commit \
            -m "chore(release): cut v$RELEASE_VERSION" \
            -m "Co-authored-by: Codex <noreply@openai.com>"
          git push origin HEAD:main

      - id: release_source
        name: Checkout release source
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.release_meta.outputs.tag_exists }}" == "true" ]]; then
            target="${{ steps.release_meta.outputs.tag_sha }}"
          else
            git fetch origin main --tags
            target="$(git rev-parse origin/main)"
          fi

          git checkout --detach "$target"
          echo "source_sha=$target" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify quality gates
        run: bun run verify

      - name: Run Rust tests
        run: cargo test --manifest-path desktop-backend/Cargo.toml

      - id: signing_identity
        name: Import signing certificate
        shell: bash
        run: |
          set -euo pipefail

          keychain_path="$RUNNER_TEMP/skein-build.keychain-db"
          cert_path="$RUNNER_TEMP/skein-cert.p12"

          echo "$APPLE_CERTIFICATE_B64" | base64 --decode > "$cert_path" 2>/dev/null || \
            echo "$APPLE_CERTIFICATE_B64" | base64 -D > "$cert_path"

          security create-keychain -p "" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$keychain_path"

          cert_id="$(security find-identity -v -p codesigning "$keychain_path" \
            | awk -F '\"' '/Developer ID Application:/ {print $2; exit}')"

          if [[ -z "$cert_id" ]]; then
            echo "Unable to resolve a Developer ID Application signing identity." >&2
            security find-identity -v -p codesigning "$keychain_path" || true
            exit 1
          fi

          {
            echo "keychain_path=$keychain_path"
            echo "identity=$cert_id"
          } >> "$GITHUB_OUTPUT"

      - id: notary_profile
        name: Configure notarytool credentials
        shell: bash
        env:
          KEYCHAIN_PATH: ${{ steps.signing_identity.outputs.keychain_path }}
        run: |
          set -euo pipefail

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"

          xcrun notarytool store-credentials "$NOTARY_PROFILE_NAME" \
            --key "$key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --keychain "$KEYCHAIN_PATH"

          echo "key_path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists on release source
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          SOURCE_SHA: ${{ steps.release_source.outputs.source_sha }}
        run: |
          set -euo pipefail

          git fetch --tags origin

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "$tag_sha" != "$SOURCE_SHA" ]]; then
              echo "Tag ${RELEASE_TAG} already exists on ${tag_sha}, expected ${SOURCE_SHA}." >&2
              exit 1
            fi
            exit 0
          fi

          git tag "${RELEASE_TAG}" "$SOURCE_SHA"
          git push origin "${RELEASE_TAG}"

      - name: Build signed unpacked Electron app
        shell: bash
        env:
          CSC_NAME: ${{ steps.signing_identity.outputs.identity }}
          CSC_KEYCHAIN: ${{ steps.signing_identity.outputs.keychain_path }}
        run: |
          set -euo pipefail

          bun run electron:prepare
          bunx electron-builder --dir --publish never

      - id: notarize
        name: Notarize and staple app bundle
        shell: bash
        env:
          KEYCHAIN_PATH: ${{ steps.signing_identity.outputs.keychain_path }}
        run: |
          set -euo pipefail

          app_path="release-artifacts/electron/mac-arm64/Skein.app"
          zip_path="$RUNNER_TEMP/Skein-notary.zip"

          if [[ ! -d "$app_path" ]]; then
            echo "Expected app bundle at $app_path" >&2
            exit 1
          fi

          ditto -c -k --keepParent "$app_path" "$zip_path"

          submission_json="$(xcrun notarytool submit "$zip_path" \
            --keychain-profile "$NOTARY_PROFILE_NAME" \
            --keychain "$KEYCHAIN_PATH" \
            --no-wait \
            --output-format json)"

          submission_id="$(python3 -c 'import json, sys; payload = json.loads(sys.argv[1]); print(payload.get("id") or payload.get("submissionId") or "")' "$submission_json")"

          if [[ -z "$submission_id" ]]; then
            echo "Missing notarization submission ID." >&2
            echo "$submission_json" >&2
            exit 1
          fi

          echo "submission_id=$submission_id" >> "$GITHUB_OUTPUT"

          attempts=0
          while true; do
            attempts=$((attempts + 1))
            set +e
            output="$(xcrun notarytool wait "$submission_id" \
              --keychain-profile "$NOTARY_PROFILE_NAME" \
              --keychain "$KEYCHAIN_PATH" \
              --timeout 20m 2>&1)"
            status=$?
            set -e

            if [[ $status -eq 0 ]]; then
              echo "$output"
              break
            fi

            echo "$output"

            if [[ $attempts -lt 4 ]] && grep -Eq \
              'NSURLErrorDomain Code=-1009|The Internet connection appears to be offline|No network route|timed out after|network connection was lost' \
              <<<"$output"; then
              echo "Transient notarization wait failure detected; retrying wait on submission ${submission_id}."
              sleep 30
              continue
            fi

            xcrun notarytool log "$submission_id" \
              --keychain-profile "$NOTARY_PROFILE_NAME" \
              --keychain "$KEYCHAIN_PATH" || true
            exit $status
          done

          xcrun stapler staple "$app_path"

      - name: Package notarized Electron release artifacts
        shell: bash
        run: |
          set -euo pipefail

          rm -rf release-artifacts/release
          bunx electron-builder \
            --prepackaged "release-artifacts/electron/mac-arm64/Skein.app" \
            --mac dmg zip \
            --publish never \
            -c.directories.output=release-artifacts/release

      - name: Generate release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          SOURCE_SHA: ${{ steps.release_source.outputs.source_sha }}
        run: |
          set -euo pipefail

          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -X POST \
            -F "tag_name=${RELEASE_TAG}" \
            -F "target_commitish=${SOURCE_SHA}" \
            --jq '.body' > release-artifacts/release-notes.md

          if [[ ! -s release-artifacts/release-notes.md ]]; then
            echo "- Initial Skein release." > release-artifacts/release-notes.md
          fi

      - name: Generate transition updater artifacts
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ -z "${LEGACY_UPDATER_PRIVATE_KEY}" ]]; then
            echo "LEGACY_UPDATER_PRIVATE_KEY must be configured to publish the pre-Electron transition release." >&2
            exit 1
          fi

          node scripts/generate-legacy-transition-artifacts.mjs "${RELEASE_VERSION}"

      - name: Publish or update GitHub release
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
          SOURCE_SHA: ${{ steps.release_source.outputs.source_sha }}
        run: |
          set -euo pipefail

          assets=(
            "release-artifacts/release/Skein-${RELEASE_VERSION}-arm64.zip"
            "release-artifacts/release/Skein-${RELEASE_VERSION}-arm64.zip.blockmap"
            "release-artifacts/release/Skein-${RELEASE_VERSION}-arm64.dmg"
            "release-artifacts/release/Skein-${RELEASE_VERSION}-arm64.dmg.blockmap"
            "release-artifacts/release/Skein.app.tar.gz"
            "release-artifacts/release/Skein.app.tar.gz.sig"
            "release-artifacts/release/latest.json"
            "release-artifacts/release/latest-mac.yml"
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Skein v${RELEASE_VERSION}" \
              --notes-file release-artifacts/release-notes.md
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            exit 0
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            gh release create "$RELEASE_TAG" \
              --title "Skein v${RELEASE_VERSION}" \
              --notes-file release-artifacts/release-notes.md \
              --target "$SOURCE_SHA" \
              --prerelease \
              "${assets[@]}"
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --title "Skein v${RELEASE_VERSION}" \
            --notes-file release-artifacts/release-notes.md \
            --target "$SOURCE_SHA" \
            "${assets[@]}"
