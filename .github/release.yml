changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
        - feat
    - title: Fixes
      labels:
        - bug
        - fix
        - regression
    - title: Maintenance
      labels:
        - chore
        - refactor
        - ci
    - title: Documentation
      labels:
        - docs
    - title: Updates
      labels:
        - "*"
